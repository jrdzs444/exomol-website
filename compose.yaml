name: exomol-opacity-app

services:
  backend:
    build:
      context: ./backend
    environment:
      EXOMOL_JOBS_DIR: /data/jobs
      TAUREX_H5_CACHE_DIR: /data/opacities
      EXOMOL_OPACITY_CATALOG_CACHE_FILE: /data/opacities/opacity_catalog.json
      EXOMOL_OPACITY_CATALOG_CACHE_TTL_SECONDS: "86400"
      EXOCROSS_AUTO_RUN: "false"
      EXOCROSS_JOB_BUILDER_ENABLED: "false"
    volumes:
      - exomol_jobs:/data/jobs
      - exomol_opacity_cache:/data/opacities
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-./}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  exomol_jobs:
  exomol_opacity_cache:
